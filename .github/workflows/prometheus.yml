name: Build & Deploy Prometheus service

on:
    workflow_dispatch:

jobs:
    upload:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup SSH
              uses: webfactory/ssh-agent@v0.9.1
              with:
                  ssh-private-key: ${{ secrets.MON_SERVER_SSH_KEY }}

            - name: Add VPN server to known hosts
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H ${{ secrets.MON_SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Upload docker-compose.yml via SSH
              run: |
                  cat ./monitoring/docker-compose.prom.yml | ssh ${{ secrets.MON_SERVER_USERNAME }}@${{ secrets.MON_SERVER_HOST }} "cat > ${{ secrets.MON_SERVER_DIRECTORY }}/docker-compose.yml"

            - name: Upload prometheus.yml via SSH
              run: |
                  cat ./monitoring/prometheus.yml | ssh ${{ secrets.MON_SERVER_USERNAME }}@${{ secrets.MON_SERVER_HOST }} "cat > ${{ secrets.MON_SERVER_DIRECTORY }}/prometheus/config/prometheus.yml"

            - name: Restart prometheus on server
              run: |
                  ssh ${{ secrets.MON_SERVER_USERNAME }}@${{ secrets.MON_SERVER_HOST }} '
                    cd ${{ secrets.MON_SERVER_DIRECTORY }}
                    mkdir -p prometheus
                    mkdir -p prometheus/config
                    mkdir -p prometheus/data
                    mv -n prometheus.yml prometheus/config
                    docker compose up -d
                  '
