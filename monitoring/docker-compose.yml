services:
    node_exporter:
        image: quay.io/prometheus/node-exporter
        container_name: node-exporter
        network_mode: host
        pid: host
        volumes:
            - '/:/host:ro,rslave'
        command:
            - '--path.rootfs=/host'
        restart: unless-stopped

    prometheus-wireguard-exporter:
        image: mindflavor/prometheus-wireguard-exporter
        container_name: wgexporter
        network_mode: host
        cap_add:
            - NET_ADMIN
        command: -a true
        restart: unless-stopped
